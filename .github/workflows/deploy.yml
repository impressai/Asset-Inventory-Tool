name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  BACKEND_ECR_REPO: asset-inventory-backend
  FRONTEND_ECR_REPO: asset-inventory-frontend
  ECS_CLUSTER: asset-inventory-cluster
  BACKEND_SERVICE: asset-backend-service
  FRONTEND_SERVICE: asset-frontend-service
  BACKEND_CONTAINER: backend
  FRONTEND_CONTAINER: frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials ───────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Login to ECR ──────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push backend ──────────────────────────────
      - name: Build and push backend image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            -t $ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$BACKEND_ECR_REPO:latest \
            ./backend
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── 5. Build & push frontend ─────────────────────────────
      - name: Build and push frontend image
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            --build-arg REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }} \
            -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:latest \
            ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── 6. Run DB migrations ─────────────────────────────────
      - name: Run Alembic migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition asset-backend \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_ID }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"$BACKEND_CONTAINER\",\"command\":[\"python\",\"-m\",\"alembic\",\"upgrade\",\"head\"]}]}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed!"
            exit 1
          fi

      # ── 7. Deploy backend ────────────────────────────────────
      - name: Render backend task definition
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/backend-task-def.json
          container-name: ${{ env.BACKEND_CONTAINER }}
          image: ${{ steps.build-backend.outputs.image }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── 8. Deploy frontend ───────────────────────────────────
      - name: Render frontend task definition
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/frontend-task-def.json
          container-name: ${{ env.FRONTEND_CONTAINER }}
          image: ${{ steps.build-frontend.outputs.image }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
